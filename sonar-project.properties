sonar.projectKey=fh
sonar.projectName=FreightHero Watchtower
sonar.projectVersion=0.1.0

sonar.host.url=${env.SONAR_HOST_URL}

sonar.sources=app,evals
sonar.tests=tests
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Worktree .git points at host paths; disable SCM when scanning via Docker on Windows.
sonar.scm.disabled=true

sonar.exclusions=\
  **/__pycache__/**,\
  **/.venv/**,\
  **/.pytest_cache/**,\
  **/challenge-specs/**,\
  **/infra/**,\
  **/docker/**,\
  **/.terraform/**,\
  **/.agents/**
