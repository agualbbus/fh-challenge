# Local SonarQube Community Edition (optional — not part of the app runtime stack).
# See docs/SONARQUBE.md and https://docs.sonarsource.com/sonarqube-server/9.9/try-out-sonarqube
services:
  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      # Required on some hosts (Docker Desktop / constrained VMs); see SonarQube troubleshooting.
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
