# Local SonarQube Community Edition (optional — not part of the app runtime stack).
# See docs/SONARQUBE.md and https://docs.sonarsource.com/sonarqube-server/9.9/try-out-sonarqube
services:
  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      # Required on some hosts (Docker Desktop / constrained VMs); see SonarQube troubleshooting.
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      # Host bind mounts — survives `docker compose down` (omit `-v`). Data under docker/sonarqube/.
      - ./docker/sonarqube/data:/opt/sonarqube/data
      - ./docker/sonarqube/extensions:/opt/sonarqube/extensions
      - ./docker/sonarqube/logs:/opt/sonarqube/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
