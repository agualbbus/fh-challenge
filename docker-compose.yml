services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtower -d watchtower"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./docker/elasticmq.conf:/opt/elasticmq.conf

