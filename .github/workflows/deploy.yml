name: deploy

on:
  push:
    branches: [github-ecs-setup, main]
  workflow_dispatch:
    inputs:
      deploy_ecs:
        description: Push :latest and roll ECS (use to test full deploy from a non-main branch)
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_REPO: freight-watchtower
      ECS_CLUSTER: freight-watchtower
      # main push always rolls ECS; other branches only when workflow_dispatch deploy_ecs=true
      DEPLOY_ECS: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.deploy_ecs) }}
    steps:
      - uses: actions/checkout@v5

      - name: Check AWS deploy role secret
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "::error::GitHub secret AWS_DEPLOY_ROLE_ARN is not set."
            echo "After terraform apply, add it from: cd infra && terraform output -raw github_deploy_role_arn"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE=$REGISTRY/$ECR_REPO
          docker build -t $IMAGE:$SHA .
          docker push $IMAGE:$SHA
          if [ "$DEPLOY_ECS" = "true" ]; then
            docker tag $IMAGE:$SHA $IMAGE:latest
            docker push $IMAGE:latest
          fi

      - name: Deploy ECS services
        if: env.DEPLOY_ECS == 'true'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          IMAGE=$REGISTRY/$ECR_REPO:$SHA
          API_SERVICE=freight-watchtower-api
          WORKER_SERVICE=freight-watchtower-worker

          force_deploy() {
            aws ecs update-service --cluster "$ECS_CLUSTER" \
              --service "$API_SERVICE" --force-new-deployment >/dev/null
            aws ecs update-service --cluster "$ECS_CLUSTER" \
              --service "$WORKER_SERVICE" --force-new-deployment >/dev/null
          }

          register_revision() {
            local service=$1
            local container=$2
            local current_task_definition

            current_task_definition=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$service" \
              --query 'services[0].taskDefinition' \
              --output text)

            aws ecs describe-task-definition --task-definition "$current_task_definition" \
              --query taskDefinition > task-definition.json

            jq --arg image "$IMAGE" --arg container "$container" '
              .containerDefinitions |= map(
                if .name == $container then .image = $image else . end
              )
              | del(
                  .taskDefinitionArn,
                  .revision,
                  .status,
                  .requiresAttributes,
                  .compatibilities,
                  .registeredAt,
                  .registeredBy
                )
            ' task-definition.json > new-task-definition.json

            aws ecs register-task-definition \
              --cli-input-json file://new-task-definition.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          }

          # Preflight IAM: revisioned deploy needs Describe/RegisterTaskDefinition + PassRole.
          if ! aws ecs describe-task-definition \
            --task-definition "$API_SERVICE" \
            --query taskDefinition.taskDefinitionArn \
            --output text >/dev/null 2>&1; then
            echo "::warning::GitHub deploy role is missing ECS task-definition permissions."
            echo "Run once: cd infra && terraform apply -target=aws_iam_role_policy.github_deploy"
            echo "Falling back to force-new-deployment (uses :latest image; task definition revision unchanged)."
            force_deploy
            exit 0
          fi

          API_TASK_DEF=$(register_revision "$API_SERVICE" api)
          WORKER_TASK_DEF=$(register_revision "$WORKER_SERVICE" worker)

          aws ecs update-service --cluster "$ECS_CLUSTER" \
            --service "$API_SERVICE" --task-definition "$API_TASK_DEF" >/dev/null
          aws ecs update-service --cluster "$ECS_CLUSTER" \
            --service "$WORKER_SERVICE" --task-definition "$WORKER_TASK_DEF" >/dev/null

      - name: Wait for services to stabilize
        if: env.DEPLOY_ECS == 'true'
        run: |
          aws ecs wait services-stable --cluster $ECS_CLUSTER \
            --services freight-watchtower-api freight-watchtower-worker
